
<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HỌC TOÁN THCS TRỰC TUYẾN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                50: '#eff6ff',
                100: '#dbeafe',
                200: '#bfdbfe',
                300: '#93c5fd',
                400: '#60a5fa',
                500: '#3b82f6',
                600: '#2563eb',
                700: '#1d4ed8',
                800: '#1e40af',
                900: '#1e3a8a',
              }
            }
          }
        }
      }
    </script>
    <!-- MathJax Configuration -->
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [['$', '$'], ['\\(', '\\)']],
          displayMath: [['$$', '$$'], ['\\[', '\\]']],
          processEscapes: true
        },
        svg: {
          fontCache: 'global'
        },
        startup: {
          typeset: false
        }
      };
    </script>
    <style>
      mjx-container {
        display: inline-block !important;
        margin: 0 !important;
        vertical-align: middle !important;
      }
      mjx-container svg {
        display: inline-block !important;
        margin: 0 !important;
        vertical-align: middle !important;
      }
      .math-content {
        display: inline !important;
        line-height: normal !important;
      }
      body {
        font-family: system-ui, -apple-system, sans-serif;
      }
    </style>
    <script type="text/javascript" id="MathJax-script" async
      src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js">
    </script>
  </head>
 <body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
